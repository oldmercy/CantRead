<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TABE Reader · Demo</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #1e1e2e;
      --bg2:          #27273d;
      --bg3:          #32324a;
      --border:       #3a3a55;
      --text:         #cdd6f4;
      --text-muted:   #7f849c;
      --accent:       #cba6f7;
      --yellow:       #f9e2af;
      --yellow-bg:    #3d2e00;
      --green:        #a6e3a1;
      --orange:       #fab387;
      --blue:         #89b4fa;
      --surface:      #1a1a2e;

      /* light */
      --lb-bg:         #eff1f5;
      --lb-bg2:        #e6e9ef;
      --lb-bg3:        #dce0e8;
      --lb-border:     #ccd0da;
      --lb-text:       #4c4f69;
      --lb-muted:      #9ca0b0;
      --lb-accent:     #7287fd;
      --lb-yellow:     #df8e1d;
      --lb-yellow-bg:  #ffe066;
      --lb-green:      #40a02b;
      --lb-orange:     #fe640b;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
      font-size: 15px;
    }

    body.light {
      --bg: var(--lb-bg); --bg2: var(--lb-bg2); --bg3: var(--lb-bg3);
      --border: var(--lb-border); --text: var(--lb-text);
      --text-muted: var(--lb-muted); --accent: var(--lb-accent);
      --yellow: var(--lb-yellow); --yellow-bg: var(--lb-yellow-bg);
      --green: var(--lb-green); --orange: var(--lb-orange);
    }

    /* ── Layout ───────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #ffe066 30%, #a6e3a1 70%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: #1e1e2e;
    }
    .logo-text h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .logo-text p  { font-size: 0.75rem; color: var(--text-muted); }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s ease;
      font-weight: 500;
    }
    .btn:hover { background: var(--border); }
    .btn.active, .btn.primary {
      background: #ffe066;
      border-color: #ffe066;
      color: #1e1e2e;
      font-weight: 700;
    }
    body.light .btn.active, body.light .btn.primary {
      background: #df8e1d; border-color: #df8e1d; color: #fff;
    }
    .btn.secondary {
      background: transparent;
      border-color: var(--border);
    }

    .toggle-pill {
      display: flex;
      background: var(--bg3);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .toggle-pill .btn {
      border: none;
      border-radius: 0;
      padding: 6px 14px;
    }
    .toggle-pill .btn:first-child { border-radius: 9px 0 0 9px; }
    .toggle-pill .btn:last-child  { border-radius: 0 9px 9px 0; }

    /* ── Main 2-column layout ─────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 0;
    }

    @media (max-width: 780px) {
      .main { grid-template-columns: 1fr; }
    }

    .pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-height: 0;
    }
    .pane:last-child { border-right: none; }

    .pane-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .pane-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
    }

    .pane-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* ── Editor textarea ─────────────────────────────────── */
    #editor {
      width: 100%;
      min-height: 400px;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      line-height: 1.7;
      resize: none;
    }

    /* ── Reading View output ─────────────────────────────── */
    #reading-view {
      max-width: 680px;
    }
    #reading-view p,
    #reading-view li {
      margin-bottom: 1em;
      font-size: 15px;
      line-height: 1.7;
    }
    #reading-view h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.6em; color: var(--text); }
    #reading-view h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5em; color: var(--text); }
    #reading-view h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.4em; color: var(--text); }
    #reading-view ul, #reading-view ol { padding-left: 1.4em; margin-bottom: 1em; }
    #reading-view blockquote {
      border-left: 3px solid var(--border);
      padding-left: 1em;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 1em;
    }
    #reading-view code {
      background: var(--bg3);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 0.9em;
    }
    #reading-view pre {
      background: var(--bg3);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin-bottom: 1em;
    }
    #reading-view pre code { background: none; padding: 0; }
    #reading-view hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5em 0;
    }
    #reading-view strong { font-weight: 700; }
    #reading-view em { font-style: italic; }
    #reading-view mark {
      background: var(--yellow-bg);
      color: var(--yellow);
      border-radius: 2px;
      padding: 0 3px;
    }
    body.light #reading-view mark {
      background: #ffe066;
      color: #5a3e00;
    }
    #reading-view u { text-decoration: underline; }

    /* ── TABE Spans ──────────────────────────────────────── */
    .tabe-bold {
      font-weight: 700;
    }
    .tabe-highlight {
      background: var(--yellow-bg);
      color: var(--yellow);
      font-weight: 600;
      border-radius: 2px;
      padding: 0 2px;
    }
    body.light .tabe-highlight {
      background: #ffe066;
      color: #5a3e00;
    }
    .tabe-italic {
      color: var(--green);
      font-style: italic;
    }
    body.light .tabe-italic {
      color: #40a02b;
    }
    .tabe-number {
      color: var(--orange);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    body.light .tabe-number {
      color: #fe640b;
    }

    /* hover reveal on processed paragraphs */
    p.tabe-processed, li.tabe-processed {
      border-left: 2px solid transparent;
      padding-left: 6px;
      margin-left: -8px;
      transition: border-color 0.2s;
    }
    p.tabe-processed:hover, li.tabe-processed:hover {
      border-left-color: #ffe066;
    }

    /* ── Legend ──────────────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .legend-swatch {
      width: 28px;
      height: 18px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }

    /* ── Layer toggles ───────────────────────────────────── */
    .layer-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      align-items: center;
    }
    .layer-toggles label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-right: 4px;
    }
    .layer-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .layer-btn.on { color: #1e1e2e; border-color: transparent; }
    .layer-btn[data-layer="nouns"].on   { background: #cdd6f4; }
    .layer-btn[data-layer="verbs"].on   { background: #ffe066; }
    .layer-btn[data-layer="adjs"].on    { background: #a6e3a1; }
    .layer-btn[data-layer="numbers"].on { background: #fab387; }
    body.light .layer-btn.on { color: #fff; }
    body.light .layer-btn[data-layer="nouns"].on   { background: #7287fd; }
    body.light .layer-btn[data-layer="verbs"].on   { background: #df8e1d; }
    body.light .layer-btn[data-layer="adjs"].on    { background: #40a02b; }
    body.light .layer-btn[data-layer="numbers"].on { background: #fe640b; }

    /* ── Status bar ──────────────────────────────────────── */
    .status-bar {
      padding: 6px 20px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #a6e3a1;
    }
    .status-dot.off { background: var(--text-muted); }

    /* ── Sample presets ──────────────────────────────────── */
    .preset-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-wrap: wrap;
      align-items: center;
    }
    .preset-bar label { font-size: 0.78rem; color: var(--text-muted); }

    /* ── Scrollbars ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body class="dark">
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-mark">T</div>
      <div class="logo-text">
        <h1>TABE Reader</h1>
        <p>For brains that bounce off walls of text · Phase 0 Demo</p>
      </div>
    </div>
    <div class="header-controls">
      <div class="toggle-pill">
        <button class="btn active" id="btn-tabe" onclick="setMode('tabe')">TABE Mode</button>
        <button class="btn" id="btn-plain" onclick="setMode('plain')">Plain</button>
      </div>
      <button class="btn secondary" id="btn-theme" onclick="toggleTheme()">☀ Light</button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: Editor -->
    <div class="pane">
      <div class="pane-header">
        <span>✏ Source Markdown</span>
        <span class="pane-badge">Edit freely</span>
      </div>
      <div class="preset-bar">
        <label>🇺🇸 EN:</label>
        <button class="btn" onclick="loadPreset('en_networking')">Networking</button>
        <button class="btn" onclick="loadPreset('en_research')">Research</button>
        <label style="margin-left:8px">🇨🇳 ZH:</label>
        <button class="btn" onclick="loadPreset('zh_notes')">产品笔记</button>
        <button class="btn" onclick="loadPreset('zh_adhd')">ADHD阅读</button>
        <label style="margin-left:8px">🌐 Mix:</label>
        <button class="btn" onclick="loadPreset('mixed_tabe')">TABE日志</button>

      <div class="pane-body">
        <textarea id="editor" spellcheck="false" oninput="renderDebounced()"></textarea>
      </div>

    <!-- RIGHT: Reading View -->
    <div class="pane">
      <div class="pane-header">
        <span>👁 Reading View</span>
        <span class="pane-badge" id="mode-badge">TABE active</span>
      </div>
      <div class="layer-toggles">
        <label>Layers:</label>
        <button class="layer-btn on" data-layer="nouns"   onclick="toggleLayer(this)"><b>Bold</b> Nouns</button>
        <button class="layer-btn on" data-layer="verbs"   onclick="toggleLayer(this)"><span style="background:#ffe066;color:#1e1e2e;padding:0 3px;border-radius:2px">Highlight</span> Verbs</button>
        <button class="layer-btn on" data-layer="adjs"    onclick="toggleLayer(this)"><i style="color:#a6e3a1">Italic</i> Adj</button>
        <button class="layer-btn on" data-layer="numbers" onclick="toggleLayer(this)"><span style="color:#fab387">123</span> Numbers</button>
      </div>
      <div class="pane-body">
        <div id="reading-view"></div>
      </div>
      <div class="legend">
        <div class="legend-item">
          <span class="legend-swatch tabe-bold" style="background:var(--bg3)">B</span> Nouns
        </div>
        <div class="legend-item">
          <span class="legend-swatch tabe-highlight">H</span> Verbs
        </div>
        <div class="legend-item">
          <span class="legend-swatch tabe-italic" style="background:var(--bg3)"><i>I</i></span> Adj/Adv
        </div>
        <div class="legend-item">
          <span class="legend-swatch tabe-number" style="background:var(--bg3)">7</span> Numbers
        </div>
      </div>
      <div class="status-bar">
        <div class="status-pill">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">compromise.js NLP · local · no API</span>
        </div>
        <span id="stats-text"></span>
      </div>
    </div>

  </div>
</div>

<!-- compromise.js: served locally, no CDN dependency -->
<script src="./compromise.js"></script>

<script>
/* ============================================================
   TABE Reader Demo — Multi-language NLP Engine
   Supports: English · Chinese · Mixed (中英混合)
   ============================================================ */

// ══════════════════════════════════════════════════════════════
// § 1. STATE
// ══════════════════════════════════════════════════════════════
const state = {
  mode: 'tabe',
  theme: 'dark',
  layers: { nouns: true, verbs: true, adjs: true, numbers: true }
};

// ══════════════════════════════════════════════════════════════
// § 2. PRESETS — English / Chinese / Mixed
// ══════════════════════════════════════════════════════════════
const presets = {

  // ── English ──────────────────────────────────────────────
  en_networking: `# Networking Note — AI Mixer

Met Sarah Chen at the AI startup mixer on Thursday. She is building a retrieval-augmented generation platform for enterprise clients. We discussed the challenges of chunking long documents into meaningful segments.

Key takeaways from the evening: most founders are struggling with evaluation metrics. Nobody has a clean solution for measuring hallucination rates in production systems. Three companies mentioned using human reviewers as a fallback.

Follow up with Sarah about her open-source evaluation framework. She mentioned releasing it in February with Apache 2.0 license. The GitHub repo already has 800 stars.

Action items: schedule a coffee chat, read her technical blog post, join the Discord community she mentioned.`,

  en_research: `# Reading Enhancement for Neurodivergent Users

Bionic Reading was introduced in 2022 as a method to improve reading speed and comprehension. The technique bolds the first letters of each word to guide the reader's eye across the text.

Studies suggest that readers with ADHD process text differently. Visual anchors reduce cognitive load by providing predictable focal points. The brain spends less energy on tracking and more on comprehension.

The critical insight is that code editors have solved this problem for programming languages. Syntax highlighting applies semantic coloring based on grammatical role: keywords, strings, comments, identifiers. Natural language lacks formal grammar but NLP libraries can approximate it.`,

  // ── Chinese ───────────────────────────────────────────────
  zh_notes: `# 产品规划笔记

这个插件的核心功能是在阅读视图里自动添加视觉格式化效果。用户不需要修改源文件，所有样式都在渲染层处理。

主要挑战是中文分词问题。中文没有空格分隔单词，所以需要用词典匹配和规则引擎来识别词性。动词通常是句子的核心识别点，名词是标签层，形容词是补充说明。

开发计划分三个阶段进行。第一阶段完成 Obsidian 插件的基础功能验证。第二阶段扩展到 Chrome 和 Firefox 浏览器插件。第三阶段考虑接入 AI 接口来提高语义准确度。

目前使用本地 NLP 引擎，完全离线运行，不需要 API 密钥，对用户友好。`,

  zh_adhd: `# ADHD 阅读体验研究

大段纯文本对 ADHD 用户来说非常困难。眼睛在密集文字中失去落脚点，导致注意力容易飘散。视觉锚点可以帮助大脑建立节奏感。

传统的生物阅读法只做机械处理，把每个词的前几个字母加粗。这种方法没有语义层，不能区分重要概念和补充说明。TABE 格式的核心创新是引入了多层次的语义强调。

名词是概念标签，动词是动作识别点，形容词是修饰补充。三个层次配合使用，让眼睛能够快速扫描并抓住核心信息，不需要逐字解码。

这个格式最初来自 Ahui 在找工作期间做 networking 记录时自然发展出来的写作习惯。用了之后发现回不去普通排版了。`,

  // ── Mixed 中英混合 ────────────────────────────────────────
  mixed_tabe: `# TABE Reader 开发日志

这个项目从一个观察开始：Ahui 在 Obsidian vault 里用 TABE 格式写笔记，发现效果非常好。

核心 insight 是 code editor 的语法高亮和 TABE 格式本质上是同一件事——用视觉信号区分语义角色。VS Code 把 keyword、string、comment 用不同颜色标出来，让程序员的眼睛可以快速扫描。TABE 想对自然语言做同样的事。

技术路线分三条：路线 A 用机械算法（Bionic Reading 风格），路线 B 用本地 NLP（compromise.js），路线 C 接入 Claude 或 GPT API。我们先做路线 B，作为免费的基础层。

Phase 0 的目标是做一个 Obsidian 插件。插件用 TypeScript 写，通过 registerMarkdownPostProcessor 钩入 Reading View，在渲染后的 DOM 上运行 NLP，不修改源文件。

下一步是把同样的逻辑打包进浏览器插件，支持 Chrome 和 Firefox。WebExtensions API 两者兼容，代码复用率大约 90%。`,

  mixed_networking: `# Networking Event 记录 — Tech Mixer @ SOMA

参加了 Thursday 的 AI startup mixer，在 SOMA 的一个 coworking space 里举办，大概有 80 人。

遇到了几个有意思的人：

Sarah 在做 RAG（retrieval-augmented generation）平台，主要客户是 enterprise。她提到最大的技术挑战是 chunking strategy——怎么把长文档切成有意义的片段。她们目前用的是 semantic chunking，效果比固定大小的 sliding window 好很多。

  // ── Manual TABE (已有手写格式) ────────────────────────────
  manual: `# Manual TABE — 手写格式示例

**Ahui** ==发现 Reading View 自动格式化效果不错== · *和手写 TABE 差不多* · **结论** ==这个插件能用==

**核心功能** ==不改源文件== · Reading View 里自动渲染 · *本地 NLP 运行* · **无需 API key**

**注意** ==已有格式的段落== · *插件自动跳过* · 不会双重格式化 · <u>这是动作项</u>`
};

// ══════════════════════════════════════════════════════════════
// § 3. MULTI-LANGUAGE NLP ENGINE
// ══════════════════════════════════════════════════════════════

// ── 3a. Language Detection ─────────────────────────────────
const CJK_RE   = /[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/;
const LATIN_RE = /[a-zA-Z]/;

function detectLang(text) {
  const hasCJK   = CJK_RE.test(text);
  const hasLatin = LATIN_RE.test(text);
  if (hasCJK && hasLatin) return 'mixed';
  if (hasCJK)   return 'zh';
  if (hasLatin) return 'en';
  return 'other';
}

// ── 3c. Chinese Tokenizer ───────────────────────────────────

function tokenizeZh(text, layers) {
  const tokens = [];
  let i = 0;

  while (i < text.length) {
    const ch = text[i];

    // Digits / numbers
    if (/\d/.test(ch)) {
      let num = '';
      while (i < text.length && /[\d.,，%％]/.test(text[i])) num += text[i++];
      if (i < text.length && /[万亿千百十%％年月日]/.test(text[i])) num += text[i++];
      tokens.push({ text: num, cls: layers.numbers ? 'tabe-number' : null });
      continue;
    }

    // Whitespace / fullwidth space
    if (/[\s\u3000\r\n]/.test(ch)) {
      tokens.push({ text: ch, cls: null }); i++; continue;
    }

    // Punctuation
    if (/[，。！？、；：""''【】《》（）…—～·\.,!?;:\-()[\]{}"']/.test(ch)) {
      tokens.push({ text: ch, cls: null }); i++; continue;
    }

    // Greedy max-match (4 → 2 chars)
    let matched = false;
    for (let len = Math.min(4, text.length - i); len >= 2; len--) {
      const word = text.slice(i, i + len);
      if (ZH_FUNCTION.has(word)) {
        tokens.push({ text: word, cls: null }); i += len; matched = true; break;
      }
      if (layers.verbs && ZH_VERBS.has(word)) {
        tokens.push({ text: word, cls: 'tabe-highlight' }); i += len; matched = true; break;
      }
      if (layers.nouns && ZH_NOUNS.has(word)) {
        tokens.push({ text: word, cls: 'tabe-bold' }); i += len; matched = true; break;
      }
      if (layers.adjs && ZH_ADJS.has(word)) {
        tokens.push({ text: word, cls: 'tabe-italic' }); i += len; matched = true; break;
      }
    }

    if (!matched) {
      // Single-char fallback
      let cls = null;
      if (ZH_FUNCTION.has(ch)) {
        cls = null;
      } else if (layers.verbs && ZH_VERBS.has(ch)) {
        cls = 'tabe-highlight';
      } else if (layers.adjs && ZH_ADJS.has(ch)) {
        cls = 'tabe-italic';
      } else if (layers.nouns && ZH_NOUNS.has(ch)) {
        cls = 'tabe-bold';
      } else if (CJK_RE.test(ch) && layers.nouns) {
        // Heuristic: unknown CJK char → likely noun (most common in Chinese)
        cls = 'tabe-bold';
      }
      tokens.push({ text: ch, cls }); i++;
    }
  }

  return mergeConsecutiveTokens(tokens);
}

// Merge adjacent tokens of the same class to reduce span clutter
function mergeConsecutiveTokens(tokens) {
  if (!tokens.length) return tokens;
  const result = [Object.assign({}, tokens[0])];
  for (let i = 1; i < tokens.length; i++) {
    const prev = result[result.length - 1];
    const cur  = tokens[i];
    if (prev.cls && cur.cls === prev.cls
        && !/[，。！？、；：…—]/.test(prev.text.slice(-1))) {
      prev.text += cur.text;
    } else {
      result.push(Object.assign({}, cur));
    }
  }
  return result;
}

// ── 3d. English Tokenizer (compromise.js) ──────────────────

function tokenizeEn(text, layers) {
  if (typeof nlp === 'undefined') return [{ text, cls: null }];
  const tokens = [];
  try {
    const sentences = nlp(text).json({ tags: true });
    for (const sent of sentences) {
      for (const term of (sent.terms || [])) {
        const tags = Array.isArray(term.tags) ? term.tags : [];
        const has  = (...names) => names.some(n => tags.includes(n));

        let cls = null;
        if (layers.numbers && has('Value','Date','NumericValue','Cardinal','Ordinal')) cls = 'tabe-number';
        else if (layers.nouns && has('ProperNoun','Noun'))    cls = 'tabe-bold';
        else if (layers.verbs && has('Verb'))                 cls = 'tabe-highlight';
        else if (layers.adjs && has('Adjective','Adverb'))    cls = 'tabe-italic';

        if (term.pre)  tokens.push({ text: term.pre,  cls: null });
        tokens.push({ text: term.text || '', cls: (cls && (term.text||'').trim()) ? cls : null });
        if (term.post) tokens.push({ text: term.post, cls: null });
      }
    }
  } catch(e) {
    return [{ text, cls: null }];
  }
  return tokens;
}

// ── 3e. Mixed-language Splitter ─────────────────────────────

function splitByScript(text) {
  const segs = [];
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (CJK_RE.test(ch)) {
      let seg = '';
      while (i < text.length && !LATIN_RE.test(text[i])) {
        seg += text[i++];
      }
      if (seg) segs.push({ text: seg, lang: 'zh' });
    } else if (LATIN_RE.test(ch) || /\d/.test(ch)) {
      let seg = '';
      while (i < text.length && !CJK_RE.test(text[i])) seg += text[i++];
      if (seg.trim()) segs.push({ text: seg, lang: 'en' });
      else if (seg)   segs.push({ text: seg, lang: 'other' });
    } else {
      // punctuation / symbols between scripts
      let seg = '';
      while (i < text.length && !CJK_RE.test(text[i]) && !LATIN_RE.test(text[i]) && !/\d/.test(text[i])) {
        seg += text[i++];
      }
      if (seg) segs.push({ text: seg, lang: 'other' });
    }
  }
  return segs;
}

// ── 3f. Main entry ─────────────────────────────────────────

function tokenizeTABE(text, layers) {
  if (!text.trim()) return [{ text, cls: null }];
  const lang = detectLang(text);

  if (lang === 'en')    return tokenizeEn(text, layers);
  if (lang === 'zh')    return tokenizeZh(text, layers);
  if (lang === 'mixed') {
    const all = [];
    for (const seg of splitByScript(text)) {
      if (seg.lang === 'zh')    all.push(...tokenizeZh(seg.text, layers));
      else if (seg.lang === 'en') all.push(...tokenizeEn(seg.text, layers));
      else                        all.push({ text: seg.text, cls: null });
    }
    return all;
  }
  return [{ text, cls: null }];
}

function tokensToHtml(tokens) {
  return tokens.map(t => {
    const e = escapeHtml(t.text);
    return (t.cls && t.text.trim()) ? `<span class="${t.cls}">${e}</span>` : e;
  }).join('');
}

function applyTABE(plainText) {
  return tokensToHtml(tokenizeTABE(plainText, state.layers));
}

// ══════════════════════════════════════════════════════════════
// § 4. UTILITIES
// ══════════════════════════════════════════════════════════════

function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════════════════
// § 5. MARKDOWN RENDERER
// ══════════════════════════════════════════════════════════════

function renderMarkdown(md) {
  const lines = md.split('\n');
  const blocks = [];
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];
    const hm = line.match(/^(#{1,6})\s+(.+)/);
    if (hm) { blocks.push({ type:'heading', level:hm[1].length, raw:hm[2] }); i++; continue; }
    if (/^-{3,}$/.test(line.trim())) { blocks.push({ type:'hr' }); i++; continue; }
    if (line.startsWith('```')) {
      let code = ''; i++;
      while (i < lines.length && !lines[i].startsWith('```')) { code += escapeHtml(lines[i]) + '\n'; i++; }
      blocks.push({ type:'code', code:code.trimEnd() }); i++; continue;
    }
    if (line.startsWith('> ')) { blocks.push({ type:'blockquote', raw:line.slice(2) }); i++; continue; }
    if (/^[*\-+]\s/.test(line)) {
      const items = [];
      while (i < lines.length && /^[*\-+]\s/.test(lines[i])) { items.push(lines[i].replace(/^[*\-+]\s/,'')); i++; }
      blocks.push({ type:'ul', items }); continue;
    }
    if (/^\d+\.\s/.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\.\s/.test(lines[i])) { items.push(lines[i].replace(/^\d+\.\s/,'')); i++; }
      blocks.push({ type:'ol', items }); continue;
    }
    if (!line.trim()) { i++; continue; }
    let raw = '';
    while (i < lines.length && lines[i].trim() && !lines[i].match(/^#{1,6}\s/) && !lines[i].startsWith('```') && !/^-{3,}$/.test(lines[i].trim())) {
      raw += (raw ? ' ' : '') + lines[i]; i++;
    }
    if (raw) blocks.push({ type:'paragraph', raw });
  }

  return blocks.map(blockToHtml).join('\n');
}

function blockToHtml(b) {
  switch (b.type) {
    case 'hr':        return '<hr>';
    case 'code':      return `<pre><code>${b.code}</code></pre>`;
    case 'heading':   return `<h${b.level}>${inlineMarkdown(b.raw)}</h${b.level}>`;
    case 'blockquote':return `<blockquote>${inlineMarkdown(b.raw)}</blockquote>`;
    case 'ul':        return `<ul>${b.items.map(r=>`<li>${paraContent(r)}</li>`).join('')}</ul>`;
    case 'ol':        return `<ol>${b.items.map(r=>`<li>${paraContent(r)}</li>`).join('')}</ol>`;
    case 'paragraph': return `<p class="tabe-processed">${paraContent(b.raw)}</p>`;
    default:          return '';
  }
}

// Paragraph content: manual TABE → inlineMarkdown; auto → NLP
function paraContent(raw) {
  const hasManual = /\*\*|==|\*[^*]|<u>/.test(raw);
  if (hasManual || state.mode !== 'tabe') return inlineMarkdown(raw);
  // Run NLP on plain text, then style the · connector
  return applyTABE(raw).replace(/·/g, '<span style="opacity:0.4;margin:0 1px">·</span>');
}

// Inline markdown for headings, blockquotes, manual paragraphs
function inlineMarkdown(text) {
  let t = escapeHtml(text);
  t = t.replace(/==(.+?)==/g,    '<mark>$1</mark>');
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
  t = t.replace(/`([^`]+)`/g,    '<code>$1</code>');
  t = t.replace(/·/g, '<span style="opacity:0.4;margin:0 1px">·</span>');
  return t;
}

// ══════════════════════════════════════════════════════════════
// § 6. RENDER PIPELINE
// ══════════════════════════════════════════════════════════════

function render() {
  const md   = document.getElementById('editor').value;
  const view = document.getElementById('reading-view');
  view.innerHTML = renderMarkdown(md);

  // Stats
  let processed = 0, skipped = 0;
  view.querySelectorAll('p, li').forEach(el => {
    if (state.mode === 'tabe' && el.querySelector('.tabe-bold,.tabe-highlight,.tabe-italic,.tabe-number')) processed++;
    else skipped++;
  });

  const dot  = document.getElementById('status-dot');
  const stat = document.getElementById('stats-text');
  const lang = detectLang(md);
  const langLabel = { en:'EN', zh:'ZH', mixed:'ZH+EN', other:'?' }[lang] || '?';
  if (state.mode === 'tabe') {
    dot.classList.remove('off');
    stat.textContent = `${langLabel} · ${processed} formatted · ${skipped} skipped`;
  } else {
    dot.classList.add('off');
    stat.textContent = 'TABE off';
  }
}

let debTimer;
function renderDebounced() { clearTimeout(debTimer); debTimer = setTimeout(render, 200); }

// ══════════════════════════════════════════════════════════════
// § 7. CONTROLS
// ══════════════════════════════════════════════════════════════

function setMode(mode) {
  state.mode = mode;
  document.getElementById('btn-tabe').classList.toggle('active', mode === 'tabe');
  document.getElementById('btn-plain').classList.toggle('active', mode === 'plain');
  document.getElementById('mode-badge').textContent = mode === 'tabe' ? 'TABE active' : 'Plain render';
  render();
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.body.className = state.theme;
  document.getElementById('btn-theme').textContent = state.theme === 'dark' ? '☀ Light' : '🌙 Dark';
}

function toggleLayer(btn) {
  const layer = btn.dataset.layer;
  state.layers[layer] = !state.layers[layer];
  btn.classList.toggle('on', state.layers[layer]);
  render();
}

function loadPreset(name) {
  document.getElementById('editor').value = presets[name];
  render();
}

// ── Init ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => loadPreset('mixed_tabe'));
